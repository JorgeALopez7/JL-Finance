<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.L. Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#101820;--navy2:#1f2d3d;--gold:#b9975b;
  --line:#e0e0e0;--line2:#eee;
  --text:#101820;--text2:#666;--text3:#999;--text4:#aaa;--text5:#bbb;
  --pos:#1a7a4c;--neg:#b03030;--bg:#fff;--surface:#fafafa;
  --font:'Helvetica Neue',Arial,sans-serif;
}
html{background:#f0f0ec;font-family:var(--font);color:var(--text);min-height:100vh}
body{max-width:1000px;margin:0 auto;background:#fff;border-left:1px solid #d4d4d4;border-right:1px solid #d4d4d4;min-height:100vh}

.topbar{background:var(--navy);height:4px}
.hdr{background:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
.logo{font-size:17px;font-weight:400;color:var(--navy);letter-spacing:0.02em}
.logo span{font-weight:700}
.logo-mark{display:inline-block;width:22px;height:22px;background:var(--navy);color:#fff;text-align:center;line-height:22px;font-size:11px;font-weight:700;margin-right:8px;vertical-align:middle}
.hdr-right{display:flex;align-items:center;gap:12px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff}
.uname{font-size:12px;color:var(--text2);letter-spacing:0.02em}

.nav{background:var(--navy);padding:0 28px;display:flex;gap:0;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.ni{padding:13px 18px;font-size:12px;letter-spacing:0.04em;color:#9aa5b1;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.15s;background:none;border-left:none;border-right:none;border-top:none;font-family:var(--font)}
.ni.active{color:#fff;border-bottom-color:var(--gold)}
.ni:hover:not(.active){color:#fff}

.body{padding:28px}
.page{display:none}.page.active{display:block}

.greet{font-size:20px;font-weight:400;color:var(--navy);margin-bottom:3px}
.greet-sub{font-size:12px;color:var(--text3);margin-bottom:26px;letter-spacing:0.02em}

.hero-card{border:1px solid var(--line);border-top:3px solid var(--gold);padding:24px 26px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-end;background:var(--surface)}
.hero-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.hero-bal{font-size:42px;font-weight:300;color:var(--navy);letter-spacing:-1px}
.hero-acct{font-size:11px;color:var(--text4);margin-top:6px;letter-spacing:0.04em}
.hero-right{text-align:right}
.hero-period{font-size:11px;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:4px}
.hero-updated{font-size:11px;color:var(--text4);letter-spacing:0.03em}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);margin-bottom:24px}
.stat{padding:18px 22px;border-right:1px solid var(--line)}
.stat:last-child{border-right:none}
.stat-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.stat-val{font-size:24px;font-weight:300;color:var(--navy);letter-spacing:-0.5px}
.stat-val.pos{color:var(--pos)}
.stat-val.neg{color:var(--neg)}

.break-wrap{border:1px solid var(--line);padding:22px 24px;margin-bottom:24px}
.break-row{display:flex;align-items:center;margin-bottom:12px}
.break-row:last-child{margin-bottom:0}
.break-name{font-size:12px;color:var(--navy);width:150px;flex-shrink:0;letter-spacing:0.02em}
.break-track{flex:1;height:14px;background:#f4f4f4;margin:0 14px}
.break-fill{height:14px;background:var(--navy)}
.break-amt{font-size:12px;color:var(--navy);width:80px;text-align:right;flex-shrink:0}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.panel-head{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--navy)}
.bud-item{margin-bottom:15px}
.bud-item:last-child{margin-bottom:0}
.bud-top{display:flex;justify-content:space-between;margin-bottom:6px}
.bud-name{font-size:12px;color:var(--navy);letter-spacing:0.03em}
.bud-vals{font-size:11px;color:var(--text3)}
.bud-track{height:3px;background:var(--line2)}
.bud-fill{height:3px;background:var(--gold)}

.met-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line)}
.met{padding:14px 18px;border-right:1px solid var(--line2);border-bottom:1px solid var(--line2)}
.met:nth-child(even){border-right:none}
.met:nth-last-child(-n+2){border-bottom:none}
.met-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.met-val{font-size:18px;font-weight:300;color:var(--navy);letter-spacing:-0.3px}
.met-sub{font-size:10px;color:var(--text5);margin-top:3px}

.sav-card{border:1px solid var(--line);border-left:3px solid var(--gold);padding:22px 24px}
.sav-top{display:flex;justify-content:space-between;align-items:flex-start}
.sav-name{font-size:15px;font-weight:500;color:var(--navy);letter-spacing:0.02em}
.sav-goal{font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:0.04em}
.sav-amt{font-size:30px;font-weight:300;color:var(--navy);letter-spacing:-0.5px}
.contrib{margin-top:18px;padding-top:14px;border-top:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center}
.contrib-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
.contrib-val{font-size:16px;font-weight:400;color:var(--navy)}

.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 12px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);border-bottom:2px solid var(--navy);font-weight:500}
.tbl td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--line2);color:var(--navy)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface)}
.amt-inc{color:var(--pos);text-align:right;white-space:nowrap}
.amt-exp{color:var(--neg);text-align:right;white-space:nowrap}
.tx-cat{font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text3)}
.tx-date{font-size:12px;color:var(--text3);white-space:nowrap}
.tx-desc{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.month-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--line);overflow-x:auto}
.month-tabs::-webkit-scrollbar{display:none}
.mt{padding:9px 16px;font-size:11px;letter-spacing:0.05em;color:var(--text3);cursor:pointer;white-space:nowrap;border-right:1px solid var(--line);background:none;border-top:none;border-bottom:none;border-left:none;font-family:var(--font)}
.mt.active{background:var(--navy);color:#fff}
.mt:last-child{border-right:none}

.totals-bar{display:flex;gap:0;border:1px solid var(--line);margin-bottom:20px}
.tb-item{padding:14px 18px;border-right:1px solid var(--line);flex:1}
.tb-item:last-child{border-right:none}
.tb-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text4);margin-bottom:5px}
.tb-val{font-size:17px;font-weight:300;color:var(--navy);letter-spacing:-0.3px}

.sub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border:1px solid var(--line);margin-bottom:20px}
.sub-item{padding:16px 20px;border-right:1px solid var(--line2);border-bottom:1px solid var(--line2)}
.sub-item:nth-child(even){border-right:none}
.sub-name{font-size:14px;font-weight:500;color:var(--navy);margin-bottom:3px}
.sub-cycle{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text4);margin-bottom:8px}
.sub-amt{font-size:20px;font-weight:300;color:var(--navy);letter-spacing:-0.5px}
.sub-total{background:var(--navy);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.sub-total-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#9aa5b1}
.sub-total-val{font-size:20px;font-weight:300;color:#fff;letter-spacing:-0.5px}

.import-box{border:1px solid var(--line);padding:22px 24px;margin-bottom:16px}
.import-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--navy);margin-bottom:8px;font-weight:500}
.import-tip{font-size:12px;color:var(--text3);line-height:1.7;margin-bottom:14px}
.import-ta{width:100%;min-height:140px;border:1px solid var(--line);padding:12px;font-size:12px;font-family:'Courier New',monospace;resize:vertical;outline:none;line-height:1.6;color:var(--navy)}
.import-ta:focus{border-color:var(--gold)}
.btn{padding:10px 22px;border:1px solid var(--navy);background:var(--navy);color:#fff;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;font-family:var(--font)}
.btn:hover{background:var(--navy2)}
.btn-out{background:#fff;color:var(--navy)}
.btn-out:hover{background:var(--surface)}
.btn-danger{border-color:var(--neg);color:var(--neg);background:#fff}
.btn-danger:hover{background:#fdf0f0}
.import-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.import-msg{font-size:12px;color:var(--pos);margin-top:10px;min-height:16px;letter-spacing:0.02em}

.savings-update{display:flex;gap:8px;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--line2)}
.savings-update label{font-size:11px;color:var(--text3);letter-spacing:0.03em;white-space:nowrap}
.savings-update input{flex:1;padding:9px 12px;border:1px solid var(--line);font-size:14px;outline:none;font-family:var(--font);color:var(--navy)}
.savings-update input:focus{border-color:var(--gold)}

.chart-box{border:1px solid var(--line);padding:22px 24px;margin-bottom:24px}
.empty{text-align:center;color:var(--text3);font-size:13px;padding:40px 0;letter-spacing:0.02em}

@media(max-width:720px){
  .two-col{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr}
  .stat{border-right:none;border-bottom:1px solid var(--line)}
  .stat:last-child{border-bottom:none}
  .sub-grid{grid-template-columns:1fr}
  .sub-item{border-right:none}
  .break-name{width:110px;font-size:11px}
  .break-amt{width:70px;font-size:11px}
  .tbl th:nth-child(3),.tbl td:nth-child(3){display:none}
}

#lock{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-inner{text-align:center}
.lock-mark{width:48px;height:48px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:0 auto 20px}
.lock-title{font-size:16px;color:var(--navy);letter-spacing:0.04em;margin-bottom:6px}
.lock-sub{font-size:11px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:24px}
.lock-input{display:block;width:260px;padding:11px 16px;border:1px solid var(--line);font-size:14px;outline:none;margin:0 auto 12px;text-align:center;font-family:var(--font)}
.lock-input:focus{border-color:var(--gold)}
.lock-err{font-size:12px;color:var(--neg);margin-top:12px;min-height:18px}
</style>
</head>

    <div class="lock-err" id="pw-error"></div>

</div>

<script>
const PW_HASH='578202bb2f950725df16e4bf6ae68f691e983f03e7e87469975ea782517e36ae';
(function(){if(sessionStorage.getItem('jlf_auth')==='1')document.getElementById('lock').style.display='none';})();
function checkPw(){
  const v=document.getElementById('pw-input').value;
  const enc=new TextEncoder().encode(v);
  crypto.subtle.digest('SHA-256',enc).then(buf=>{
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===PW_HASH){sessionStorage.setItem('jlf_auth','1');document.getElementById('lock').style.display='none';}
    else{document.getElementById('pw-error').textContent='Incorrect password.';document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();}
  });
}

function loadTx(){try{const s=localStorage.getItem('jlf_tx');return s?JSON.parse(s):JSON.parse(JSON.stringify(SEED_TX))}catch(e){return JSON.parse(JSON.stringify(SEED_TX))}}
function saveTx(t){try{localStorage.setItem('jlf_tx',JSON.stringify(t))}catch(e){}}
function loadSaved(){try{return parseFloat(localStorage.getItem('jlf_saved')||'0')}catch(e){return 0}}
function saveSavedAmt(v){try{localStorage.setItem('jlf_saved',String(v))}catch(e){}}

function fmt(n){return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtS(n){return(n<0?'-':'+')+fmt(n)}
function getMonth(d){return d.substring(0,7)}
function currentMonth(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')}
function getMonths(){return[...new Set(transactions.map(t=>getMonth(t.date)))].sort().reverse()}
function filterMo(mo){return transactions.filter(t=>getMonth(t.date)===mo)}
function monthName(m){return new Date(m+'-01').toLocaleString('default',{month:'long',year:'numeric'})}
function monthShort(m){return new Date(m+'-01').toLocaleString('default',{month:'short',year:'2-digit'})}
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id]}}

function categorize(desc,isIncome){
  const d=desc.toUpperCase();
  if(isIncome){
    if(d.includes('PAYROLL')||d.includes('AMERICANAIRLINES'))return'Paycheck';
    if(d.includes('ZELLE FROM'))return'Zelle Received';
    if(d.includes('DEPOSIT')||d.includes('SCHOLARSHIP'))return'Scholarship';
    return'Other Income';
  }
  if(d.includes('STEEL REAL'))return'Gym/Fitness';
  if(d.includes('ZELLE TO'))return'Zelle Sent';
  if(/QT |QUIKTRIP/.test(d)||d.includes('BUC-EE')||d.includes('7-ELEVEN')||d.includes('LEDBETTER')||d.includes('EXXON')||d.includes('HONEY FARMS')||d.includes('SPEEDMAX'))return'Gas';
  if(d.includes('KROGER')||d.includes('WALMART')||d.includes('WAL-MART')||d.includes('WM SUPER')||d.includes('TARGET')||d.includes('BEST BUY'))return'Groceries/Shopping';
  if(d.includes('CHIPOTLE')||d.includes('PANDA')||d.includes('JACK IN')||d.includes("TIFF")||d.includes('WAFFLE HOUSE')||d.includes('IHOP')||d.includes("DENNY")||d.includes('PLUCKERS')||d.includes('SMOOTHIE')||d.includes("CHILI")||d.includes('DUTCH BROS')||d.includes('SONIC')||d.includes('INSOMNIA')||d.includes('OCEAN KING')||d.includes('SPELLED MILK')||d.includes('ODDFELLOW')||d.includes('TWISTED')||d.includes('IN-N-OUT')||d.includes('CAFE BRAZIL'))return'Dining Out';
  if(d.includes('SPOTIFY')||d.includes('APPLE.COM')||d.includes('CLAUDE')||d.includes('ADOBE'))return'Subscriptions';
  if(d.includes('LUXX')||d.includes('GYM'))return'Gym/Fitness';
  if(d.includes('SKYVIEW')||d.includes('AASKYVIEW'))return'AA Cafe (Work)';
  if(d.includes('ATM')||d.includes('WITHDRAWAL')||d.includes('CASH E'))return'Cash Withdrawal';
  if(d.includes('AUTOZONE')||d.includes('ADVANCE AUTO'))return'Car Maintenance/Mods';
  if(d.includes('UBER'))return'Transportation';
  return'Misc / Other';
}

function importTransactions(){
  const raw=document.getElementById('paste-input').value.trim();
  if(!raw){document.getElementById('import-msg').textContent='Nothing to import.';return;}
  let added=0;
  raw.split('\n').forEach(line=>{
    line=line.trim();if(!line)return;
    const dm=line.match(/^(\d{2}\/\d{2}\/\d{2,4})/);if(!dm)return;
    const p=dm[1].split('/');const yr=p[2].length===2?'20'+p[2]:p[2];
    const dateStr=yr+'-'+p[0]+'-'+p[1];
    const am=line.match(/\$?([\d,]+\.\d{2})\s*$/);if(!am)return;
    const amt=parseFloat(am[1].replace(',',''));
    const desc=line.replace(dm[0],'').replace(am[0],'').trim().replace(/\s+/g,' ');
    const isInc=line.includes('PAYROLL')||line.includes('ZELLE FROM')||line.includes('DEPOSIT')||line.includes('SCHOLARSHIP');
    transactions.push({date:dateStr,type:isInc?'Income':'Expense',cat:categorize(desc,isInc),amt,desc});
    added++;
  });
  transactions.sort((a,b)=>a.date.localeCompare(b.date));
  saveTx(transactions);
  document.getElementById('import-msg').textContent='Imported '+added+' transaction'+(added!==1?'s':'')+'.';
  document.getElementById('paste-input').value='';
  renderAll();
}

function clearAll(){
  if(!confirm('Clear all transaction data?'))return;
  transactions=[];saveTx(transactions);savedSoFar=0;saveSavedAmt(0);
  document.getElementById('import-msg').textContent='All data cleared.';
  renderAll();
}

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn)btn.classList.add('active');
  if(p==='overview')renderOverview();
  else if(p==='transactions')renderTransactions();
  else if(p==='budget')renderBudget();
  else if(p==='subscriptions')renderSubscriptions();
  else if(p==='savings')renderSavings();
}

function renderOverview(){
  const mo=currentMonth(),moTx=filterMo(mo);
  const income=moTx.filter(t=>t.type==='Income').reduce((s,t)=>s+t.amt,0);
  const expenses=moTx.filter(t=>t.type==='Expense').reduce((s,t)=>s+t.amt,0);
  const net=income-expenses;
  const needsSpent=moTx.filter(t=>t.type==='Expense'&&NEEDS_CATS.includes(t.cat)).reduce((s,t)=>s+t.amt,0);
  const wantsSpent=moTx.filter(t=>t.type==='Expense'&&WANTS_CATS.includes(t.cat)).reduce((s,t)=>s+t.amt,0);
  const subTotal=getSubsTotal();

  const catMap={};
  moTx.filter(t=>t.type==='Expense').forEach(t=>{catMap[t.cat]=(catMap[t.cat]||0)+t.amt});
  const catSorted=Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]);
  const maxCat=catSorted.length?catMap[catSorted[0]]:1;

  let breakHtml='';
  if(catSorted.length===0){breakHtml='<div class="empty">No spending recorded this month.</div>';}
  else{catSorted.forEach(c=>{const pct=(catMap[c]/maxCat*100).toFixed(0);breakHtml+='<div class="break-row"><div class="break-name">'+c+'</div><div class="break-track"><div class="break-fill" style="width:'+pct+'%"></div></div><div class="break-amt">'+fmt(catMap[c])+'</div></div>';});}

  document.getElementById('page-overview').innerHTML=
    '<div class="greet">Good morning, Jorge</div>'+
    '<div class="greet-sub">Here is your financial summary for '+monthName(mo)+'.</div>'+
    '<div class="hero-card"><div><div class="hero-label">Posted balance</div><div class="hero-bal">'+fmt(POSTED_BALANCE)+'</div><div class="hero-acct">Wells Fargo Checking \u00b7\u00b7\u00b7\u00b79030</div></div>'+
    '<div class="hero-right"><div class="hero-period">'+new Date(mo+"-01").toLocaleString("default",{month:"long",year:"numeric"})+'</div><div class="hero-updated">Last updated '+new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+'</div></div></div>'+
    '<div class="stat-grid">'+
      '<div class="stat"><div class="stat-label">Income this month</div><div class="stat-val pos">'+fmt(income)+'</div></div>'+
      '<div class="stat"><div class="stat-label">Expenses this month</div><div class="stat-val neg">'+fmt(expenses)+'</div></div>'+
      '<div class="stat"><div class="stat-label">Net this month</div><div class="stat-val '+(net>=0?'pos':'neg')+'">'+fmtS(net)+'</div></div>'+
    '</div>'+
    '<div class="break-wrap"><div class="panel-head">Spending breakdown \u2014 '+new Date(mo+"-01").toLocaleString("default",{month:"long"})+'</div>'+breakHtml+'</div>'+
    '<div class="two-col"><div><div class="panel-head">50 / 30 / 20 budget</div>'+
      budRow('Needs',needsSpent,NEEDS_TARGET)+budRow('Wants',wantsSpent,WANTS_TARGET)+
      '<div class="bud-item"><div class="bud-top"><span class="bud-name">Savings</span><span class="bud-vals">'+fmt(SAVINGS_TARGET)+' / mo target</span></div><div class="bud-track"><div class="bud-fill" style="width:100%"></div></div></div>'+
    '</div><div><div class="panel-head">Key figures</div><div class="met-grid">'+
      '<div class="met"><div class="met-label">Savings target</div><div class="met-val">'+fmt(SAVINGS_TARGET)+'</div><div class="met-sub">per month</div></div>'+
      '<div class="met"><div class="met-label">Recurring</div><div class="met-val">'+fmt(subTotal)+'</div><div class="met-sub">subscriptions</div></div>'+
      '<div class="met"><div class="met-label">Needs used</div><div class="met-val">'+(NEEDS_TARGET>0?Math.round(needsSpent/NEEDS_TARGET*100):0)+'%</div><div class="met-sub">of target</div></div>'+
      '<div class="met"><div class="met-label">Wants used</div><div class="met-val">'+(WANTS_TARGET>0?Math.round(wantsSpent/WANTS_TARGET*100):0)+'%</div><div class="met-sub">of target</div></div>'+
    '</div></div></div>'+
    '<div class="sav-card"><div class="sav-top"><div><div class="sav-name">Savings</div><div class="sav-goal">Total set aside to date</div></div><div style="text-align:right"><div class="sav-amt">'+fmt(savedSoFar)+'</div></div></div>'+
    '<div class="contrib"><div class="contrib-label">Monthly contribution target</div><div class="contrib-val">'+fmt(SAVINGS_TARGET)+' / mo</div></div></div>';
}

function budRow(name,spent,target){
  const pct=target>0?Math.min(spent/target*100,100):0;
  return '<div class="bud-item"><div class="bud-top"><span class="bud-name">'+name+'</span><span class="bud-vals">'+fmt(spent)+' / '+fmt(target)+'</span></div><div class="bud-track"><div class="bud-fill" style="width:'+pct.toFixed(0)+'%"></div></div></div>';
}

let txMonth=null;
function renderTransactions(){
  const months=getMonths();
  if(!txMonth||!months.includes(txMonth))txMonth=months[0]||currentMonth();
  const tx=filterMo(txMonth).sort((a,b)=>b.date.localeCompare(a.date));
  const income=tx.filter(t=>t.type==='Income').reduce((s,t)=>s+t.amt,0);
  const expenses=tx.filter(t=>t.type==='Expense').reduce((s,t)=>s+t.amt,0);
  let mtabs='';months.forEach(m=>{mtabs+='<button class="mt '+(m===txMonth?'active':'')+'" onclick="setTxMonth(\''+m+'\')">'+monthName(m)+'</button>';});
  let rows='';
  tx.forEach(t=>{rows+='<tr><td class="tx-date">'+t.date.substring(5).replace('-','/')+'</td><td class="tx-desc" title="'+t.desc+'">'+t.desc+'</td><td class="tx-cat">'+t.cat+'</td><td class="'+(t.type==='Income'?'amt-inc':'amt-exp')+'">'+(t.type==='Income'?'+':'-')+fmt(t.amt)+'</td></tr>';});
  document.getElementById('page-transactions').innerHTML=
    '<div class="month-tabs">'+mtabs+'</div>'+
    '<div class="totals-bar"><div class="tb-item"><div class="tb-label">Income</div><div class="tb-val">'+fmt(income)+'</div></div>'+
    '<div class="tb-item"><div class="tb-label">Expenses</div><div class="tb-val">'+fmt(expenses)+'</div></div>'+
    '<div class="tb-item"><div class="tb-label">Net</div><div class="tb-val">'+fmtS(income-expenses)+'</div></div>'+
    '<div class="tb-item"><div class="tb-label">Count</div><div class="tb-val">'+tx.length+'</div></div></div>'+
    (tx.length?'<table class="tbl"><thead><tr><th>Date</th><th>Description</th><th>Category</th><th style="text-align:right">Amount</th></tr></thead><tbody>'+rows+'</tbody></table>':'<div class="empty">No transactions for this month.</div>');
}
function setTxMonth(m){txMonth=m;renderTransactions();}

function renderBudget(){
  const mo=currentMonth(),moTx=filterMo(mo);
  const needsSpent=moTx.filter(t=>t.type==='Expense'&&NEEDS_CATS.includes(t.cat)).reduce((s,t)=>s+t.amt,0);
  const wantsSpent=moTx.filter(t=>t.type==='Expense'&&WANTS_CATS.includes(t.cat)).reduce((s,t)=>s+t.amt,0);
  function big(name,cats,spent,target){
    const pct=target>0?Math.min(spent/target*100,100):0;const over=spent>target;
    return '<div style="border:1px solid var(--line);padding:20px 22px;margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div style="font-size:14px;font-weight:500;color:var(--navy)">'+name+'</div><div style="font-size:10px;color:var(--text4);letter-spacing:0.03em;margin-top:3px">'+cats+'</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:300;color:'+(over?'var(--neg)':'var(--navy)')+'">'+fmt(spent)+'</div><div style="font-size:11px;color:var(--text3)">of '+fmt(target)+'</div></div></div><div class="bud-track" style="margin-top:10px"><div class="bud-fill" style="width:'+pct.toFixed(0)+'%;background:'+(over?'var(--neg)':'var(--gold)')+'"></div></div><div style="font-size:11px;color:var(--text3);margin-top:6px">'+pct.toFixed(0)+'% of target used</div></div>';
  }
  document.getElementById('page-budget').innerHTML=
    '<div style="font-size:12px;color:var(--text3);margin-bottom:18px;letter-spacing:0.02em">Based on '+fmt(BIWEEKLY)+' biweekly \u00b7 Monthly estimate '+fmt(MONTHLY)+' \u00b7 '+monthName(mo)+'</div>'+
    big('Needs','Gas \u00b7 Groceries \u00b7 Car \u00b7 Gym \u00b7 Bills',needsSpent,NEEDS_TARGET)+
    big('Wants','Dining \u00b7 Subscriptions \u00b7 Shopping \u00b7 Misc \u00b7 AA Cafe',wantsSpent,WANTS_TARGET)+
    '<div style="border:1px solid var(--line);border-left:3px solid var(--gold);padding:20px 22px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:500;color:var(--navy)">Savings</div><div style="font-size:10px;color:var(--text4);letter-spacing:0.03em;margin-top:3px">20% of monthly income</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:300;color:var(--navy)">'+fmt(SAVINGS_TARGET)+'</div><div style="font-size:11px;color:var(--text3)">per month</div></div></div></div>';
}

function getSubsList(){
  const subs={};
  transactions.filter(t=>t.type==='Expense'&&t.cat==='Subscriptions').forEach(t=>{
    let name='Other';
    for(const k in SUB_KEYWORDS){if(t.desc.toUpperCase().includes(SUB_KEYWORDS[k])){name=k;break;}}
    if(!subs[name]||t.date>subs[name].date)subs[name]={amt:t.amt,date:t.date};
  });
  return subs;
}
function getSubsTotal(){const s=getSubsList();return Object.values(s).reduce((a,b)=>a+b.amt,0);}

function renderSubscriptions(){
  const subs=getSubsList();
  const names=Object.keys(subs);
  let items='';
  names.forEach(n=>{items+='<div class="sub-item"><div class="sub-name">'+n+'</div><div class="sub-cycle">Monthly \u00b7 last '+subs[n].date.substring(5).replace('-','/')+'</div><div class="sub-amt">'+fmt(subs[n].amt)+'</div></div>';});
  if(names.length%2===1)items+='<div class="sub-item"></div>';
  const total=getSubsTotal();
  document.getElementById('page-subscriptions').innerHTML=
    '<div class="panel-head">Active subscriptions &amp; recurring payments</div>'+
    (names.length?'<div class="sub-grid">'+items+'</div><div class="sub-total"><div class="sub-total-label">Total monthly recurring</div><div class="sub-total-val">'+fmt(total)+' / mo</div></div>':'<div class="empty">No recurring subscriptions detected yet.</div>');
}

function renderSavings(){
  document.getElementById('page-savings').innerHTML=
    '<div class="sav-card" style="padding:26px 28px"><div class="sav-top"><div><div class="sav-name" style="font-size:17px">Savings</div><div class="sav-goal">Total set aside to date</div></div><div style="text-align:right"><div class="sav-amt" style="font-size:36px">'+fmt(savedSoFar)+'</div></div></div>'+
    '<div class="savings-update"><label>Update saved amount</label><input type="number" id="saved-input" value="'+savedSoFar+'" min="0" step="0.01"><button class="btn" onclick="updateSaved()" style="padding:9px 20px">Save</button></div>'+
    '<div class="contrib"><div class="contrib-label">Monthly contribution target (20%)</div><div class="contrib-val">'+fmt(SAVINGS_TARGET)+' / mo</div></div></div>';
}
function updateSaved(){const v=parseFloat(document.getElementById('saved-input').value)||0;savedSoFar=v;saveSavedAmt(v);renderSavings();renderOverview();}

function renderAll(){renderOverview();renderTransactions();renderBudget();renderSubscriptions();renderSavings();}
renderAll();
</script>
